<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <title>KiOSC-BrowsR</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #000;
    }

    /* ── Kiosk iframe ─────────────────────────────────────────── */
    #kiosk {
      position: fixed;
      inset: 0;
      width: 100%; height: 100%;
      border: none;
      background: #000;
    }

    /* ── Overlay panel ────────────────────────────────────────── */
    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.94);
      display: flex;
      flex-direction: column;
      padding: env(safe-area-inset-top, 20px) 20px env(safe-area-inset-bottom, 20px);
      z-index: 100;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.25s, visibility 0.25s;
      overflow-y: auto;
      gap: 16px;
    }
    #overlay.open { visibility: visible; opacity: 1; }

    .ov-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding-bottom: 8px;
      border-bottom: 1px solid #253040;
    }
    .ov-header-left { display: flex; align-items: center; gap: 10px; }
    .ov-header-left img { height: 22px; width: auto; }
    .ov-header-sep { width: 1px; height: 18px; background: #253040; }
    .ov-header h1 { color: #128FCF; font-size: 1.1rem; font-weight: 700; }
    .ov-close {
      background: #253040; border: none; color: #e5e7eb;
      width: 34px; height: 34px; border-radius: 50%;
      font-size: 1rem; cursor: pointer;
    }

    .card {
      background: #161b22;
      border: 1px solid #253040;
      border-radius: 10px;
      padding: 16px;
    }
    .card h2 {
      font-size: 0.68rem; text-transform: uppercase;
      letter-spacing: 1px; color: #7d9ab5; margin-bottom: 12px;
    }

    .field { margin-bottom: 10px; }
    .field label { display: block; font-size: 0.78rem; color: #7d9ab5; margin-bottom: 4px; }

    input[type="url"], input[type="text"], input[type="number"] {
      width: 100%; padding: 10px 12px;
      background: #0d1117; border: 1px solid #253040;
      border-radius: 6px; color: #e5e7eb; font-size: 0.9rem;
      outline: none;
    }
    input:focus { border-color: #128FCF; }

    .btn {
      display: block; width: 100%;
      padding: 11px; margin-top: 8px;
      border: none; border-radius: 7px;
      font-size: 0.9rem; font-weight: 600; cursor: pointer;
    }
    .btn-primary   { background: #128FCF; color: #fff; }
    .btn-secondary { background: #253040; color: #e5e7eb; }

    .device-list { display: flex; flex-direction: column; gap: 8px; }
    .device-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px;
      background: #0d1117; border: 1px solid #253040; border-radius: 7px;
    }
    .device-item .dname { font-size: 0.85rem; color: #e5e7eb; }
    .device-item .daddr { font-size: 0.75rem; color: #7d9ab5; font-family: monospace; }
    .device-item button {
      background: #128FCF; color: #fff; border: none;
      padding: 5px 12px; border-radius: 5px;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
    }
    .device-item.own { border-color: #128FCF; }

    #status-line {
      font-size: 0.78rem; color: #7d9ab5; text-align: center; padding: 4px 0;
    }
    #status-line span { color: #128FCF; }

    /* Toast */
    #toast {
      position: fixed; bottom: calc(env(safe-area-inset-bottom, 16px) + 16px);
      left: 50%; transform: translateX(-50%) translateY(16px);
      background: #161b22; border: 1px solid #128FCF; color: #128FCF;
      padding: 9px 22px; border-radius: 20px; font-size: 0.83rem; font-weight: 500;
      pointer-events: none; opacity: 0; transition: opacity 0.25s, transform 0.25s; z-index: 200;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <!-- Kiosk display -->
  <iframe id="kiosk" src="about:blank" allow="autoplay; fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox"></iframe>

  <!-- Admin overlay — triple-tap anywhere to open -->
  <div id="overlay">
    <div class="ov-header">
      <div class="ov-header-left">
        <img src="pke-logo.svg" alt="PKE">
        <div class="ov-header-sep"></div>
        <h1>KiOSC-BrowsR</h1>
      </div>
      <button class="ov-close" onclick="closeOverlay()">✕</button>
    </div>

    <div id="status-line">Status: <span id="osc-status">not connected</span></div>

    <!-- Navigate -->
    <div class="card">
      <h2>Navigate</h2>
      <div class="field">
        <label>URL</label>
        <input type="url" id="nav-url" placeholder="https://…">
      </div>
      <button class="btn btn-primary" onclick="navigate()">Go</button>
    </div>

    <!-- Device settings -->
    <div class="card">
      <h2>This device settings</h2>
      <div class="field">
        <label>Home URL</label>
        <input type="url" id="cfg-home" placeholder="https://…">
      </div>
      <div class="field">
        <label>OSC listen port</label>
        <input type="number" id="cfg-port" value="9000" min="1024" max="65535">
      </div>
      <div class="field">
        <label>Device name (mDNS)</label>
        <input type="text" id="cfg-name" placeholder="my-device">
      </div>
      <button class="btn btn-primary" onclick="applySettings()">Apply &amp; save</button>
    </div>

    <!-- Discovered peers on LAN -->
    <div class="card">
      <h2>KiOSC-BrowsR devices on this network</h2>
      <div class="device-list" id="device-list">
        <p style="font-size:0.82rem;color:#7d9ab5">Scanning…</p>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script type="module" src="./app.js"></script>
</body>
</html>
