appId: com.dhpke.kioscbrowsr
productName: KiOSC-BrowsR

directories:
  buildResources: build
  output: dist

files:
  - "electron/**"
  - "package.json"

extraResources:
  - from: "config/config.yaml.example"
    to: "config.yaml.example"

linux:
  target:
    - deb
    - AppImage
  category: Utility
  executableName: kiosc-browsr
  maintainer: "DHPKE <dhpke@users.noreply.github.com>"
  desktop:
    Name: KiOSC-BrowsR
    Comment: OSC/UDP-controlled browser kiosk
    Categories: Utility;Network;

win:
  target:
    - nsis

mac:
  target:
    - dmg
  category: public.app-category.utilities
  darkModeSupport: true

dmg:
  # Layout of items shown in the DMG Finder window.
  # The third entry adds Install.command so users on macOS Sequoia can
  # right-click → Open it to remove the quarantine xattr and install.
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
    - x: 130
      y: 300
      type: file
      path: build/Install.command
      name: Install.command

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
