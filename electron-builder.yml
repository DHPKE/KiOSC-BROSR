appId: com.dhpke.kioscbrowsr
productName: KiOSC-BrowsR

directories:
  buildResources: build
  output: dist

files:
  - "electron/**"
  - "package.json"

extraResources:
  - from: "config/config.yaml.example"
    to: "config.yaml.example"

linux:
  target:
    - target: deb
      arch: [x64, arm64]
    - target: AppImage
      arch: [x64, arm64]
  category: Utility
  executableName: kiosc-browsr
  maintainer: "DHPKE <dhpke@users.noreply.github.com>"
  desktop:
    Name: KiOSC-BrowsR
    Comment: OSC/UDP-controlled browser kiosk
    Categories: Utility;Network;

win:
  target:
    - nsis

mac:
  target:
    - dmg
  category: public.app-category.utilities
  darkModeSupport: true

dmg:
  contents:
    - x: 410
      y: 150
      type: link
      path: /Applications
    - x: 130
      y: 150
      type: file
    - x: 130
      y: 300
      type: file
      path: build/Install.command
      name: Install.command

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
