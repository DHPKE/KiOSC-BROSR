appId: com.dhpke.kioscbrowsr
productName: KiOSC-BrowsR

directories:
  buildResources: build
  output: dist

files:
  - "electron/**"
  - "package.json"

extraResources:
  - from: "config/config.yaml.example"
    to: "config.yaml.example"

linux:
  target:
    - deb
    - AppImage
  category: Utility
  executableName: kiosc-browsr
  maintainer: "DHPKE <dhpke@users.noreply.github.com>"
  desktop:
    Name: KiOSC-BrowsR
    Comment: OSC/UDP-controlled browser kiosk
    Categories: Utility;Network;

win:
  target:
    - nsis

mac:
  target:
    - dmg
  category: public.app-category.utilities
  darkModeSupport: true

dmg:
  # Include the Install.command so users on macOS Sequoia can bypass Gatekeeper.
  # Shell scripts get "unidentified developer + Open Anyway"; .app bundles get
  # "damaged" with no bypass. The script removes the quarantine xattr and copies
  # the app to /Applications using ditto (signature-safe).
  extraFiles:
    - from: "build/Install.command"
      to: "Install.command"

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
