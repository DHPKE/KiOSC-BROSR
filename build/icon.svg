<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f1923"/>
      <stop offset="100%" stop-color="#1a2d3a"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e3448"/>
      <stop offset="100%" stop-color="#112233"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#059669" stop-opacity="0.7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="24" flood-color="#000" flood-opacity="0.5"/>
    </filter>
    <filter id="glow-filter" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="round">
      <rect width="1024" height="1024" rx="224" ry="224"/>
    </clipPath>
  </defs>

  <!-- App icon rounded rect background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g clip-path="url(#round)" opacity="0.07">
    <line x1="0" y1="128" x2="1024" y2="128" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="256" x2="1024" y2="256" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="384" x2="1024" y2="384" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="512" x2="1024" y2="512" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="640" x2="1024" y2="640" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="768" x2="1024" y2="768" stroke="#34d399" stroke-width="1"/>
    <line x1="0" y1="896" x2="1024" y2="896" stroke="#34d399" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="512" y1="0" x2="512" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="640" y1="0" x2="640" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="768" y1="0" x2="768" y2="1024" stroke="#34d399" stroke-width="1"/>
    <line x1="896" y1="0" x2="896" y2="1024" stroke="#34d399" stroke-width="1"/>
  </g>

  <!-- Monitor body -->
  <rect x="172" y="200" width="680" height="460" rx="28" ry="28" fill="url(#screen)" stroke="#34d399" stroke-width="5" filter="url(#shadow)"/>

  <!-- Monitor screen bezel highlight -->
  <rect x="172" y="200" width="680" height="460" rx="28" ry="28" fill="none" stroke="#34d399" stroke-width="2" opacity="0.4"/>

  <!-- Screen inner surface -->
  <rect x="204" y="232" width="616" height="396" rx="8" ry="8" fill="#0a1520"/>

  <!-- Screen content: address bar -->
  <rect x="224" y="252" width="576" height="36" rx="6" fill="#0f2030"/>
  <circle cx="248" cy="270" r="7" fill="#f87171" opacity="0.8"/>
  <circle cx="272" cy="270" r="7" fill="#fbbf24" opacity="0.8"/>
  <circle cx="296" cy="270" r="7" fill="#34d399" opacity="0.8"/>
  <rect x="316" y="261" width="464" height="18" rx="4" fill="#1a3045"/>
  <!-- URL text suggestion -->
  <rect x="326" y="265" width="180" height="10" rx="3" fill="#34d399" opacity="0.4"/>

  <!-- Screen content: web page blocks -->
  <rect x="224" y="304" width="576" height="60" rx="6" fill="#0d1e30"/>
  <rect x="244" y="318" width="200" height="12" rx="3" fill="#34d399" opacity="0.7"/>
  <rect x="244" y="338" width="320" height="8" rx="3" fill="#1e4060" opacity="0.8"/>

  <rect x="224" y="376" width="278" height="120" rx="6" fill="#0d1e30"/>
  <rect x="244" y="394" width="180" height="10" rx="3" fill="#60a5fa" opacity="0.6"/>
  <rect x="244" y="412" width="220" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="244" y="426" width="200" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="244" y="440" width="160" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="244" y="458" width="100" height="20" rx="4" fill="#34d399" opacity="0.8"/>

  <rect x="522" y="376" width="278" height="120" rx="6" fill="#0d1e30"/>
  <rect x="542" y="394" width="180" height="10" rx="3" fill="#60a5fa" opacity="0.6"/>
  <rect x="542" y="412" width="220" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="542" y="426" width="200" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="542" y="440" width="160" height="7" rx="3" fill="#1e3a5a" opacity="0.7"/>
  <rect x="542" y="458" width="100" height="20" rx="4" fill="#34d399" opacity="0.8"/>

  <!-- Monitor stand neck -->
  <rect x="476" y="660" width="72" height="60" rx="4" fill="#1e3448"/>
  <!-- Monitor stand base -->
  <rect x="360" y="716" width="304" height="36" rx="18" fill="#1e3448"/>

  <!-- OSC waves emanating from bottom-right — signal / network -->
  <g filter="url(#glow-filter)" opacity="0.85">
    <!-- Wave arcs centered at bottom-right of monitor -->
    <path d="M 820 600 A 60 60 0 0 1 780 640" fill="none" stroke="#34d399" stroke-width="12" stroke-linecap="round" opacity="0.9"/>
    <path d="M 855 568 A 110 110 0 0 1 785 672" fill="none" stroke="#34d399" stroke-width="9" stroke-linecap="round" opacity="0.65"/>
    <path d="M 890 538 A 158 158 0 0 1 792 706" fill="none" stroke="#34d399" stroke-width="7" stroke-linecap="round" opacity="0.45"/>
    <path d="M 924 509 A 204 204 0 0 1 796 740" fill="none" stroke="#34d399" stroke-width="5" stroke-linecap="round" opacity="0.28"/>
    <!-- Signal source dot -->
    <circle cx="796" cy="604" r="14" fill="#34d399" opacity="0.95"/>
    <circle cx="796" cy="604" r="8" fill="#fff" opacity="0.7"/>
  </g>

  <!-- "KiOSC" wordmark at bottom -->
  <text x="512" y="930" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="82" font-weight="800" fill="url(#glow)"
        text-anchor="middle" letter-spacing="-1">KiOSC</text>
  <text x="512" y="985" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', Arial, sans-serif"
        font-size="38" font-weight="400" fill="#34d399" opacity="0.5"
        text-anchor="middle" letter-spacing="14">BrowsR</text>
</svg>
